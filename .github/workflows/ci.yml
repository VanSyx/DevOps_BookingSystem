name: CI/CD - Booking System

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend:
    name: Backend API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build check
        run: npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000/api

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'    

    steps:
      - name: Validate deploy hook secrets 
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
          RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing GitHub secret RENDER_BACKEND_DEPLOY_HOOK_URL"
            exit 1
          fi

          if [ -z "$RENDER_FRONTEND_DEPLOY_HOOK_URL" ]; then
            echo "::error::Missing GitHub secret RENDER_FRONTEND_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Deploy backend on Render
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }} 
        run: curl --fail --show-error --request POST "$RENDER_BACKEND_DEPLOY_HOOK_URL"
      - name: Deploy frontend on Render
        env:
          RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }} 
        run: curl --fail --show-error --request POST "$RENDER_FRONTEND_DEPLOY_HOOK_URL" 
